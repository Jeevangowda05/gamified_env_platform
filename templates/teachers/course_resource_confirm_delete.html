{% extends 'teachers/base.html' %}

{% block title %}Delete Course Resource{% endblock %}

{% block teacher_content %}
<div class="card">
    <div class="card-header">
        <h5 class="mb-0">Delete Resource</h5>
    </div>
    <div class="card-body">
        <p>Are you sure you want to delete <strong>{{ resource.title }}</strong>?</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Delete</button>
            <a href="{% url 'teacher:course_builder' resource.course.id %}" class="btn btn-outline-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
