{% extends 'teachers/base.html' %}

{% block title %}Edit Question{% endblock %}

{% block teacher_content %}
<div class="card">
    <div class="card-header"><h5 class="mb-0">Update Question</h5></div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">Save</button>
            <a href="{% url 'teacher:quiz_questions' quiz.id %}" class="btn btn-outline-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
