{% extends 'teachers/base.html' %}

{% block title %}Delete Question{% endblock %}

{% block teacher_content %}
<div class="card">
    <div class="card-body">
        <h5>Delete Question</h5>
        <p>Are you sure you want to delete this question?</p>
        <p class="text-muted">{{ question.question_text }}</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Delete</button>
            <a href="{% url 'teacher:quiz_questions' quiz.id %}" class="btn btn-outline-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
